<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>German B2 Beruf Trainer</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <h1>German B2 Beruf Trainer</h1>
    <p class="small-text">Тренажёр слов (B2 Beruf)</p>

    <!-- ЗАГРУЗКА -->
    <div class="panel">
      <div class="controls">
        <select id="daySelect">
          <option value="tag1">Tag 1</option>
          <option value="tag2">Tag 2</option>
          <option value="tag3">Tag 3</option>
        </select>

        <button id="loadBtn">Загрузить</button>
        <button id="repeatUnknownBtn">Сложные</button>
      </div>

      <div class="mode-buttons">
        <button id="cardsModeBtn" class="active">📇 Карточки</button>
        <button id="testModeBtn">📝 Тест</button>
        <button id="presentationModeBtn">🎬 Режим презентации</button>
      </div>
    </div>

    <!-- КАРТОЧКИ -->
    <div id="cardsSection" class="panel">

      <div id="cardsCounter" class="question-count"></div>

      <div class="word-container">
        <div id="cardWord" class="word"></div>
        <button id="speakCardBtn" class="speak-btn" title="Озвучить">🔊</button>
      </div>

      <div id="cardAnswer" class="hidden">
        <div id="cardTranslation" class="translation"></div>

        <div class="examples">
          <p><b>DE:</b> <span id="cardExampleDe"></span></p>
          <p><b>RU:</b> <span id="cardExampleRu"></span></p>
        </div>
      </div>

      <!-- РЕЖИМ ВВОДА -->
      <div id="typingSection" class="hidden">
        <div class="typing-area">
          <input type="text" id="typingInput" placeholder="Введите перевод..." />
          <button id="checkTypingBtn">Проверить</button>
        </div>
        <div id="typingFeedback" class="typing-feedback hidden">
          <p id="typingMessage"></p>
          <p id="typingCorrectAnswer"></p>
        </div>
      </div>

      <!-- ПОИСК -->
      <div class="controls">
        <input id="searchInput" type="text" placeholder="Поиск..." />
        <button id="searchBtn">Найти</button>
        <button id="resetSearchBtn">Сброс</button>
        <button id="toggleSoundBtn" class="sound-toggle-btn">🔊 Звук вкл</button>
      </div>

      <!-- ФИЛЬТРЫ -->
      <div class="controls">
        <button id="showAllBtn">Все</button>
        <button id="randomWordBtn">Случайное</button>

        <label>
          <input id="autoNextCheckbox" type="checkbox" checked />
          Автопереход
        </label>
      </div>

      <!-- УПРАВЛЕНИЕ -->
      <div class="nav-buttons">
        <select id="cardModeSelect">
          <option value="de-to-ru">DE → RU</option>
          <option value="ru-to-de">RU → DE</option>
        </select>

        <button id="typingModeBtn" class="typing-btn">✏️ Режим ввода</button>

        <button id="showAnswerBtn">Ответ</button>
        <button id="prevBtn">Назад</button>
        <button id="nextBtn">Вперёд</button>
      </div>

      <!-- ОЦЕНКА -->
      <div class="nav-buttons">
        <button id="knowBtn">Знаю</button>
        <button id="dontKnowBtn">Не знаю</button>
      </div>

      <p id="wordStatus" class="small-text"></p>
      <p id="statsBox" class="small-text"></p>
    </div>

    <!-- ТЕСТ -->
    <div id="testSection" class="panel hidden">

      <div id="testCounter" class="question-count"></div>

      <div class="test-word-container">
        <div id="testWord" class="word"></div>
        <button id="speakTestBtn" class="speak-btn" title="Озвучить">🔊</button>
      </div>

      <div id="answersContainer" class="answers"></div>

      <p id="testMessage"></p>

      <div class="nav-buttons">
        <button id="nextQuestionBtn" class="hidden">Дальше</button>
        <button id="restartTestBtn" class="hidden">Заново</button>
      </div>

      <div id="resultBox" class="small-text"></div>
    </div>

    <!-- РЕЖИМ ПРЕЗЕНТАЦИИ -->
    <div id="presentationSection" class="presentation-panel hidden">
      <button id="presentationExitBtn" class="presentation-exit-btn">✕ Выход</button>
      <button id="presentationPauseBtn" class="presentation-control-btn pause-btn">⏸ Пауза</button>
      <button id="presentationStopBtn" class="presentation-control-btn stop-btn">⏹ Остановить</button>
      
      <!-- Боковая панель со списком слов -->
      <div id="presentationSidebar" class="presentation-sidebar">
        <div class="sidebar-header">
          <h3>📚 Список слов</h3>
          <button id="toggleSidebarBtn" class="toggle-sidebar-btn" title="Скрыть панель">◀</button>
        </div>
        <div id="wordsList" class="words-list"></div>
      </div>
      
      <!-- Основной контейнер для контента презентации -->
      <div id="presentationMain" class="presentation-main">
        <div id="presentationContent" class="presentation-content">
          <div id="presentationCounter" class="presentation-counter"></div>
          
          <div class="presentation-word-container">
            <div id="presentationWord" class="presentation-word"></div>
            <button id="speakPresentationBtn" class="presentation-speak-btn" title="Озвучить">🔊</button>
          </div>
          
          <div id="presentationTranslation" class="presentation-translation"></div>
          <div id="presentationExamples" class="presentation-examples">
            <p><span class="example-label">DE:</span> <span id="presentationExampleDe"></span></p>
            <p><span class="example-label">RU:</span> <span id="presentationExampleRu"></span></p>
          </div>
        </div>
      </div>
      
      <div class="presentation-progress">
        <div id="presentationProgressBar" class="presentation-progress-bar"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
